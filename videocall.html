<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Call 📞</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0d1a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    nav { background: #1a1a2e; padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #2a2a40; }
    nav a { color: #8a7cff; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
    nav h2 { flex: 1; font-size: 1.1rem; }
    .call-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 700px; }
    video { width: 100%; aspect-ratio: 4/3; border-radius: 14px; background: #111; object-fit: cover; border: 1px solid #2a2a40; }
    .video-label { text-align: center; color: #888; font-size: 0.8rem; margin-top: 4px; }
    .controls { display: flex; gap: 14px; }
    .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 1.3rem; cursor: pointer; transition: transform 0.1s; }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-btn.red { background: #ff4444; color: #fff; }
    .ctrl-btn.dark { background: #2a2a40; color: #fff; }
    .call-form { background: #1a1a2e; border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; }
    .call-form h3 { margin-bottom: 14px; }
    .call-form input { width: 100%; background: #0d0d1a; border: 1.5px solid #333; border-radius: 10px; color: #fff; padding: 10px 14px; font-size: 0.9rem; outline: none; margin-bottom: 12px; }
    .call-form input:focus { border-color: #8a7cff; }
    .btn-primary { width: 100%; padding: 12px; background: #8a7cff; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #7a6cf0; }
    .status-msg { text-align: center; color: #888; font-size: 0.9rem; }
    .incoming-call { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; }
    .incoming-call.show { display: flex; }
    .incoming-inner { background: #1a1a2e; border-radius: 20px; padding: 30px; text-align: center; max-width: 320px; }
    .incoming-inner h3 { margin-bottom: 8px; }
    .incoming-inner p { color: #888; margin-bottom: 20px; }
    .call-btns { display: flex; gap: 14px; justify-content: center; }
    .accept-btn { background: #48c78e; color: #fff; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 1.5rem; cursor: pointer; }
    .decline-btn { background: #ff4444; color: #fff; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 1.5rem; cursor: pointer; }
  </style>
</head>
<body>

<nav>
  <a onclick="goBack()">← Back</a>
  <h2>📞 Video Call</h2>
</nav>

<div class="call-area" id="callArea">

  <!-- Call form (shown when not in a call) -->
  <div class="call-form" id="callForm">
    <h3>Start a Call</h3>
    <input type="text" id="callTargetInput" placeholder="Enter anonymous name to call..."/>
    <button class="btn-primary" onclick="startCall()">📞 Start Call</button>
    <p class="status-msg" id="statusMsg" style="margin-top:12px"></p>
  </div>

  <!-- Video grid (shown during call) -->
  <div class="video-grid" id="videoGrid" style="display:none">
    <div>
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="video-label">You (muted preview)</div>
    </div>
    <div>
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="video-label" id="remoteLabel">Waiting...</div>
    </div>
  </div>

  <div class="controls" id="callControls" style="display:none">
    <button class="ctrl-btn dark" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="ctrl-btn dark" id="videoBtn" onclick="toggleVideo()">📹</button>
    <button class="ctrl-btn red" onclick="endCall()">📵</button>
  </div>

</div>

<!-- Incoming Call -->
<div class="incoming-call" id="incomingCall">
  <div class="incoming-inner">
    <h3>📞 Incoming Call</h3>
    <p id="callerName">Someone is calling...</p>
    <div class="call-btns">
      <button class="accept-btn" onclick="acceptCall()">✅</button>
      <button class="decline-btn" onclick="rejectCall()">✕</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const API_URL = "https://annomuss-backend-icgp.onrender.com"; // Change to your backend URL
  const token = localStorage.getItem("token");
  let user = null;

  try { user = JSON.parse(localStorage.getItem("user") || "null"); } catch (e) { user = null; }

  if (!token || !user) { window.location.href = "index.html"; }

  // Go back to dashboard
  function goBack() { window.location.href = "dashboard.html"; }

  const socket = io(API_URL, { auth: { token } });
  socket.emit("register", user?.anonymousName);

  let localStream = null;
  let peerConnection = null;
  let incomingOffer = null;
  let callerName = null;
  let isMuted = false;
  let isVideoOff = false;
  let currentCallTarget = null;

  const iceServers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

  // ─── Start Call ────────────────────────────────────────────────────
  async function startCall() {
    const target = document.getElementById("callTargetInput").value.trim();
    if (!target) return setStatus("Enter a name to call ❌");
    if (target === user?.anonymousName) return setStatus("Can't call yourself 😅");

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById("localVideo").srcObject = localStream;
      showVideoGrid(target);

      peerConnection = new RTCPeerConnection(iceServers);
      localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

      peerConnection.ontrack = (e) => {
        document.getElementById("remoteVideo").srcObject = e.streams[0];
      };

      peerConnection.onicecandidate = (e) => {
        if (e.candidate) socket.emit("ice-candidate", { to: target, candidate: e.candidate });
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      currentCallTarget = target;
      socket.emit("call-user", { to: target, offer, from: user?.anonymousName });
      setStatus(`Calling ${target}...`);
    } catch (err) {
      setStatus("Camera/mic access denied ❌");
      console.error(err);
    }
  }

  // ─── Accept Call ───────────────────────────────────────────────────
  async function acceptCall() {
    document.getElementById("incomingCall").classList.remove("show");
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById("localVideo").srcObject = localStream;
      showVideoGrid(callerName);

      peerConnection = new RTCPeerConnection(iceServers);
      localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

      peerConnection.ontrack = (e) => {
        document.getElementById("remoteVideo").srcObject = e.streams[0];
      };

      peerConnection.onicecandidate = (e) => {
        if (e.candidate) socket.emit("ice-candidate", { to: callerName, candidate: e.candidate });
      };

      await peerConnection.setRemoteDescription(incomingOffer);
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      currentCallTarget = callerName;
      socket.emit("call-answer", { to: callerName, answer });
    } catch (err) {
      setStatus("Failed to start call ❌");
    }
  }

  function rejectCall() {
    document.getElementById("incomingCall").classList.remove("show");
    socket.emit("reject-call", { to: callerName });
    callerName = null;
    incomingOffer = null;
  }

  function endCall() {
    if (currentCallTarget) socket.emit("end-call", { to: currentCallTarget });
    cleanupCall();
  }

  function cleanupCall() {
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    document.getElementById("localVideo").srcObject = null;
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("videoGrid").style.display = "none";
    document.getElementById("callControls").style.display = "none";
    document.getElementById("callForm").style.display = "block";
    currentCallTarget = null;
    setStatus("Call ended 👋");
  }

  function toggleMute() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🎤";
  }

  function toggleVideo() {
    if (!localStream) return;
    isVideoOff = !isVideoOff;
    localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
    document.getElementById("videoBtn").textContent = isVideoOff ? "📷" : "📹";
  }

  function showVideoGrid(remoteUser) {
    document.getElementById("callForm").style.display = "none";
    document.getElementById("videoGrid").style.display = "grid";
    document.getElementById("callControls").style.display = "flex";
    document.getElementById("remoteLabel").textContent = remoteUser || "Remote";
  }

  function setStatus(msg) { document.getElementById("statusMsg").textContent = msg; }

  // ─── Socket Events ─────────────────────────────────────────────────
  socket.on("incoming-call", ({ from, offer }) => {
    callerName = from;
    incomingOffer = offer;
    document.getElementById("callerName").textContent = `${from} is calling...`;
    document.getElementById("incomingCall").classList.add("show");
  });

  socket.on("call-answered", async ({ answer }) => {
    if (!peerConnection) return;
    await peerConnection.setRemoteDescription(answer);
    setStatus("Connected ✅");
  });

  socket.on("ice-candidate", async ({ candidate }) => {
    if (peerConnection && candidate) {
      try { await peerConnection.addIceCandidate(candidate); } catch (e) {}
    }
  });

  socket.on("call-ended", () => { cleanupCall(); setStatus("Call ended by other user"); });
  socket.on("call-rejected", () => { cleanupCall(); setStatus("Call declined ❌"); });
  socket.on("call-failed", ({ reason }) => { cleanupCall(); setStatus(reason || "Call failed ❌"); });
</script>
</body>
</html>
