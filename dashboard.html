<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard 🎭</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<div class="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">🎭</div>
    <div class="user-card">
      <div class="avatar" id="avatarLetter"></div>
      <div class="user-info">
        <strong id="userName"></strong>
        <span class="badge">Anonymous</span>
      </div>
    </div>

    <nav>
      <a class="nav-item active" onclick="showSection('moods')">🌸 Feelings</a>
      <a class="nav-item" onclick="showSection('chat')">💬 Chat</a>
      <a class="nav-item" onclick="showSection('friends')">👥 Friends</a>
      <a class="nav-item" onclick="showSection('feed')">🌍 Community</a>
    </nav>

    <button class="logout" onclick="logout()">Logout</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- ── Moods Section ── -->
    <section id="section-moods" class="section">
      <h2>How are you feeling? 🌸</h2>

      <div class="emoji-grid">
        <div class="emoji-btn" data-emotion="happy" onclick="selectEmotion(this)">😊 Happy</div>
        <div class="emoji-btn" data-emotion="sad" onclick="selectEmotion(this)">😢 Sad</div>
        <div class="emoji-btn" data-emotion="lonely" onclick="selectEmotion(this)">🌑 Lonely</div>
        <div class="emoji-btn" data-emotion="anxious" onclick="selectEmotion(this)">😰 Anxious</div>
        <div class="emoji-btn" data-emotion="angry" onclick="selectEmotion(this)">😠 Angry</div>
        <div class="emoji-btn" data-emotion="neutral" onclick="selectEmotion(this)">😐 Neutral</div>
        <div class="emoji-btn" data-emotion="excited" onclick="selectEmotion(this)">🤩 Excited</div>
        <div class="emoji-btn" data-emotion="grateful" onclick="selectEmotion(this)">🙏 Grateful</div>
        <div class="emoji-btn" data-emotion="overwhelmed" onclick="selectEmotion(this)">🌊 Overwhelmed</div>
        <div class="emoji-btn" data-emotion="hopeful" onclick="selectEmotion(this)">🌟 Hopeful</div>
      </div>

      <textarea id="moodText" placeholder="Want to share more? (optional)" rows="3" maxlength="500"></textarea>
      <button onclick="logMood()">Log Feeling 🌸</button>
      <p id="moodStatus"></p>

      <div id="moodHistory" class="history-list"></div>
    </section>

    <!-- ── Chat Section ── -->
    <section id="section-chat" class="section hidden">
      <h2>Private Chat 💬</h2>
      <div class="chat-search">
        <input id="chatTarget" placeholder="Anonymous name to chat with..." />
        <button onclick="openChat()">Open Chat</button>
      </div>

      <div id="chatBox" class="chat-box hidden">
        <div class="chat-header">
          <span id="chatWith"></span>
          <span id="typingIndicator" class="typing-hint hidden">typing...</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="chat-input">
          <input id="msgInput" placeholder="Type a message..." onkeyup="handleTyping(event)" />
          <button onclick="sendMessage()">Send ➤</button>
        </div>
      </div>
    </section>

    <!-- ── Friends Section ── -->
    <section id="section-friends" class="section hidden">
      <h2>Friends 👥</h2>
      <div class="friend-add">
        <input id="friendSearch" placeholder="Search anonymous name..." oninput="searchUsers()" />
      </div>
      <div id="searchResults" class="search-results"></div>
      <h3 style="margin-top:24px">Your Friends</h3>
      <div id="friendsList" class="friends-list"></div>
    </section>

    <!-- ── Community Feed ── -->
    <section id="section-feed" class="section hidden">
      <h2>Community Feelings 🌍</h2>
      <p class="subtitle">Anonymous feelings from everyone — no names shown.</p>
      <div id="communityFeed" class="feed-list"></div>
    </section>

  </main>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const API = "http://localhost:3000/api";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "null");

// ─── Auth Guard ──────────────────────────────────────────────────
if (!token || !user) window.location.href = "index.html";

// ─── Init ────────────────────────────────────────────────────────
document.getElementById("userName").innerText = user.anonymousName;
document.getElementById("avatarLetter").innerText = user.anonymousName[0].toUpperCase();

// ─── Socket.IO ───────────────────────────────────────────────────
const socket = io("http://localhost:3000");
socket.emit("register", user.anonymousName);

socket.on("private-message", ({ from, message }) => {
  if (currentChatTarget === from) {
    appendMessage(from, message, false);
  }
});

socket.on("typing", ({ from }) => {
  if (currentChatTarget === from) {
    document.getElementById("typingIndicator").classList.remove("hidden");
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      document.getElementById("typingIndicator").classList.add("hidden");
    }, 2000);
  }
});

// ─── Navigation ──────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById(`section-${name}`).classList.remove("hidden");
  event.target.classList.add("active");

  if (name === "moods") loadMoodHistory();
  if (name === "friends") { loadFriends(); }
  if (name === "feed") loadCommunityFeed();
}

// ─── Moods ───────────────────────────────────────────────────────
let selectedEmotion = null;

function selectEmotion(el) {
  document.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  selectedEmotion = el.dataset.emotion;
}

async function logMood() {
  if (!selectedEmotion) return setMoodStatus("Pick an emotion first 🌸", "#e74c3c");
  const text = document.getElementById("moodText").value.trim();

  const res = await authFetch("/moods", { method: "POST", body: JSON.stringify({ emotion: selectedEmotion, text }) });
  const data = await res.json();

  if (res.ok) {
    setMoodStatus(data.message, "#27ae60");
    document.getElementById("moodText").value = "";
    document.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
    selectedEmotion = null;
    loadMoodHistory();
  } else {
    setMoodStatus(data.message, "#e74c3c");
  }
}

function setMoodStatus(msg, color) {
  const el = document.getElementById("moodStatus");
  el.innerText = msg;
  el.style.color = color;
}

async function loadMoodHistory() {
  const res = await authFetch("/moods/my");
  if (!res.ok) return;
  const moods = await res.json();
  const container = document.getElementById("moodHistory");

  if (!moods.length) {
    container.innerHTML = `<p style="color:#aaa; text-align:center">No moods logged yet 🌱</p>`;
    return;
  }

  container.innerHTML = moods.map(m => `
    <div class="history-item">
      <span class="mood-tag ${m.emotion}">${emotionEmoji(m.emotion)} ${m.emotion}</span>
      <span class="mood-text">${m.text || ""}</span>
      <span class="mood-time">${timeAgo(m.createdAt)}</span>
    </div>
  `).join("");
}

// ─── Chat ────────────────────────────────────────────────────────
let currentChatTarget = null;
let typingTimeout = null;

function openChat() {
  const target = document.getElementById("chatTarget").value.trim();
  if (!target) return;
  currentChatTarget = target;
  document.getElementById("chatWith").innerText = `💬 ${target}`;
  document.getElementById("chatBox").classList.remove("hidden");
  loadChatHistory(target);
}

async function loadChatHistory(target) {
  const res = await authFetch(`/messages/chat/${target}`);
  if (!res.ok) return;
  const msgs = await res.json();
  const container = document.getElementById("messages");
  container.innerHTML = "";
  msgs.forEach(m => appendMessage(m.from, m.message, m.from === user.anonymousName));
}

function appendMessage(from, message, isMe) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${isMe ? "msg-me" : "msg-them"}`;
  div.innerHTML = `<div class="bubble">${escHtml(message)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const message = input.value.trim();
  if (!message || !currentChatTarget) return;
  input.value = "";

  // Optimistic UI
  appendMessage(user.anonymousName, message, true);

  // Send via socket (real-time)
  socket.emit("private-message", { from: user.anonymousName, to: currentChatTarget, message });

  // Persist to DB
  authFetch("/messages/send", { method: "POST", body: JSON.stringify({ to: currentChatTarget, message }) });
}

let typingEmitTimeout = null;
function handleTyping(e) {
  if (e.key === "Enter") return sendMessage();
  clearTimeout(typingEmitTimeout);
  typingEmitTimeout = setTimeout(() => {
    socket.emit("typing", { from: user.anonymousName, to: currentChatTarget });
  }, 300);
}

// ─── Friends ─────────────────────────────────────────────────────
let searchDebounce = null;

function searchUsers() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(async () => {
    const q = document.getElementById("friendSearch").value.trim();
    if (q.length < 2) return document.getElementById("searchResults").innerHTML = "";

    const res = await authFetch(`/users/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) return;
    const users = await res.json();

    document.getElementById("searchResults").innerHTML = users.map(u => `
      <div class="result-item">
        <span>${u.anonymousName}</span>
        <button onclick="addFriend('${u.anonymousName}')">Add +</button>
      </div>
    `).join("") || `<p style="color:#aaa">No users found</p>`;
  }, 400);
}

async function addFriend(anonymousName) {
  const res = await authFetch("/users/friends/add", { method: "POST", body: JSON.stringify({ anonymousName }) });
  const data = await res.json();
  alert(data.message);
  loadFriends();
}

async function loadFriends() {
  const res = await authFetch("/users/friends");
  if (!res.ok) return;
  const friends = await res.json();
  const container = document.getElementById("friendsList");

  if (!friends.length) {
    container.innerHTML = `<p style="color:#aaa">No friends yet. Search above to add some! 🤝</p>`;
    return;
  }

  container.innerHTML = friends.map(f => `
    <div class="friend-item">
      <div class="avatar small">${f.anonymousName[0].toUpperCase()}</div>
      <span>${f.anonymousName}</span>
      <button class="secondary small" onclick="chatWithFriend('${f.anonymousName}')">Chat 💬</button>
    </div>
  `).join("");
}

function chatWithFriend(name) {
  document.getElementById("chatTarget").value = name;
  showSection("chat");
  openChat();
}

// ─── Community Feed ───────────────────────────────────────────────
async function loadCommunityFeed() {
  const res = await authFetch("/moods/community");
  if (!res.ok) return;
  const moods = await res.json();
  const container = document.getElementById("communityFeed");

  if (!moods.length) {
    container.innerHTML = `<p style="color:#aaa; text-align:center">No feelings shared yet 🌱</p>`;
    return;
  }

  container.innerHTML = moods.map(m => `
    <div class="feed-item">
      <span class="mood-tag ${m.emotion}">${emotionEmoji(m.emotion)} ${m.emotion}</span>
      ${m.text ? `<p class="feed-text">"${escHtml(m.text)}"</p>` : ""}
      <span class="mood-time">${timeAgo(m.createdAt)}</span>
    </div>
  `).join("");
}

// ─── Helpers ─────────────────────────────────────────────────────
function authFetch(path, options = {}) {
  return fetch(`${API}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr);
  const m = Math.floor(diff / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

function emotionEmoji(e) {
  const map = { happy:"😊", sad:"😢", lonely:"🌑", anxious:"😰", angry:"😠", neutral:"😐", excited:"🤩", grateful:"🙏", overwhelmed:"🌊", hopeful:"🌟" };
  return map[e] || "💭";
}

// Init
loadMoodHistory();
</script>
</body>
</html>
