<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Messages — Annomuss</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#03030c;--l1:#08081c;--l2:#0d0d22;--card:#10102a;
  --b:#1a1a3e;--rim:#252552;
  --v:#7c5cf4;--v2:#a58bff;--rose:#ff4f87;--teal:#00d9b4;
  --tx:#e0dcff;--tx2:#8e8ab5;--tx3:#4a4768;
  --fD:'Bricolage Grotesque',sans-serif;--fB:'Instrument Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fB)}
#app{height:100dvh;display:flex;flex-direction:column;max-width:680px;margin:0 auto}

/* ─ TOPBAR ─ */
#topbar{display:flex;align-items:center;padding:11px 14px;gap:10px;
  background:rgba(3,3,12,.97);border-bottom:1px solid var(--b);flex-shrink:0;backdrop-filter:blur(16px);z-index:5}
.back-btn{background:var(--card);border:1px solid var(--b);border-radius:9px;
  padding:7px 12px;color:var(--tx2);font-size:.78rem;cursor:pointer;font-family:var(--fD);font-weight:700;transition:all .14s}
.back-btn:hover{border-color:var(--v);color:var(--v2)}
#topTitle{font-family:var(--fD);font-size:.95rem;font-weight:800;flex:1}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;transition:background .3s}
.dot.off{background:var(--tx3)}

/* ─ INBOX ─ */
#inbox{flex:1;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px;text-align:center;gap:10px;color:var(--tx3)}
.empty-ico{font-size:2.5rem}
.empty-ttl{font-family:var(--fD);font-size:1rem;font-weight:800;color:var(--tx2)}
.empty-sub{font-size:.78rem;line-height:1.6}
.conv{display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid rgba(26,26,62,.5);cursor:pointer;transition:background .12s}
.conv:active,.conv:hover{background:rgba(124,92,244,.045)}
.av{width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#7c5cf4,#ff4f87);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  flex-shrink:0;position:relative}
.av-ring{position:absolute;bottom:1px;right:1px;width:11px;height:11px;
  border-radius:50%;background:var(--teal);border:2px solid var(--bg);display:none}
.conv-body{flex:1;min-width:0}
.conv-name{font-family:var(--fD);font-size:.88rem;font-weight:800}
.conv-preview{font-size:.74rem;color:var(--tx3);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;margin-top:2px;max-width:230px}
.conv-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.conv-time{font-size:.62rem;color:var(--tx3)}
.unread-badge{background:var(--v);color:#fff;border-radius:20px;font-size:.6rem;
  font-weight:800;min-width:18px;height:18px;display:flex;align-items:center;
  justify-content:center;padding:0 5px;font-family:var(--fD)}

/* ─ CHAT PANEL (slides in from right) ─ */
#chat{position:fixed;inset:0;max-width:680px;margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:20}
#chat.open{transform:translateX(0)}
.chat-top{display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:rgba(3,3,12,.97);border-bottom:1px solid var(--b);flex-shrink:0;backdrop-filter:blur(16px)}
.chat-av{width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#7c5cf4,#ff4f87);
  display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.chat-name{font-family:var(--fD);font-size:.9rem;font-weight:800}
.chat-sub{font-size:.68rem;color:var(--tx3);min-height:14px;transition:color .2s}
.chat-sub.typing{color:var(--teal)}

/* ─ MESSAGES ─ */
#msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;
  flex-direction:column;gap:5px;scroll-behavior:smooth}
.date-divider{text-align:center;font-size:.65rem;color:var(--tx3);
  padding:8px 0;display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:"";flex:1;height:1px;background:var(--b)}
.row{display:flex;flex-direction:column;animation:pop .15s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.row.me{align-items:flex-end}
.row.them{align-items:flex-start}
.bubble{max-width:76%;padding:10px 13px;border-radius:18px;
  font-size:.88rem;line-height:1.55;word-break:break-word}
.row.me .bubble{background:linear-gradient(135deg,rgba(124,92,244,.88),rgba(255,79,135,.78));
  color:#fff;border-bottom-right-radius:4px}
.row.them .bubble{background:var(--l2);border:1px solid var(--b);border-bottom-left-radius:4px}
.meta{font-size:.6rem;margin-top:3px;opacity:.5;display:flex;gap:3px;align-items:center}
.row.me .meta{justify-content:flex-end;color:#fff}
.row.them .meta{color:var(--tx3)}
.sys{text-align:center;font-size:.72rem;color:var(--tx3);
  padding:5px 14px;background:rgba(26,26,62,.4);border-radius:20px;
  margin:6px auto;max-width:260px}
.fail-note{font-size:.62rem;color:var(--rose);margin-top:2px;text-align:right}

/* ─ INPUT ─ */
.input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;
  background:rgba(3,3,12,.97);border-top:1px solid var(--b);flex-shrink:0;
  padding-bottom:max(10px,env(safe-area-inset-bottom))}
#inp{flex:1;background:var(--l2);border:1.5px solid var(--b);
  border-radius:22px;color:var(--tx);padding:10px 15px;
  font-size:.88rem;font-family:var(--fB);outline:none;resize:none;
  max-height:100px;line-height:1.45;transition:border-color .15s}
#inp:focus{border-color:var(--v)}
#inp::placeholder{color:var(--tx3)}
#sendBtn{width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#7c5cf4,#ff4f87);
  border:none;color:#fff;font-size:1rem;cursor:pointer;
  flex-shrink:0;transition:all .15s;box-shadow:0 2px 12px rgba(124,92,244,.3)}
#sendBtn:hover{transform:scale(1.08)}
#sendBtn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ─ SPINNER / TOAST ─ */
.ld{text-align:center;padding:40px;color:var(--tx3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--b);
  border-top-color:var(--v);border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--card);border:1px solid var(--rim);border-radius:10px;
  padding:8px 16px;font-size:.77rem;color:var(--tx2);opacity:0;
  transition:all .22s;z-index:99;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div id="topTitle">💬 Messages</div>
    <div class="dot off" id="dot" title="Connecting..."></div>
  </div>

  <!-- INBOX -->
  <div id="inbox">
    <div class="ld"><span class="spin"></span></div>
  </div>

  <!-- CHAT PANEL -->
  <div id="chat">
    <div class="chat-top">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="chat-av">🎭</div>
      <div>
        <div class="chat-name" id="chatName"></div>
        <div class="chat-sub" id="chatSub">—</div>
      </div>
    </div>
    <div id="msgs"></div>
    <div class="input-bar">
      <textarea id="inp" placeholder="Message…" rows="1"
        onkeydown="onKey(event)" oninput="onType()"></textarea>
      <button id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const API   = "https://annomuss-backend-icgp.onrender.com";
const tok   = localStorage.getItem("token");
let ME = null;
try { ME = JSON.parse(localStorage.getItem("user")||"{}"); } catch(e){}
if (!tok || !ME?.anonymousName) { location.href = "index.html"; }

let peer      = null;   // who we're chatting with
let typeTmr   = null;
let sock      = null;
let sockReady = false;

// ── SOCKET ────────────────────────────────────────────────────────────────
function connectSocket() {
  sock = io(API, {
    auth: { token: tok },
    transports: ["websocket","polling"],
    reconnection: true,
    reconnectionDelay: 1500,
  });

  sock.on("connect", () => {
    sockReady = true;
    sock.emit("register"); // re-register name → socket mapping
    setDot(true);
  });

  sock.on("disconnect", () => {
    sockReady = false;
    setDot(false);
    setSub("Reconnecting…");
  });

  sock.on("connect_error", () => {
    sockReady = false;
    setDot(false);
  });

  // Incoming message
  sock.on("private-message", ({ from, message, fileUrl, fileName, isImage }) => {
    if (from === peer) {
      addBubble({ from, message, fileUrl, fileName, isImage, createdAt: new Date() });
      sock.emit("message-read", { from });
      setSub("Online ●");
    } else {
      toast(`💬 ${from}: ${(message||"").slice(0,40)}`);
      refreshInbox();
    }
  });

  // Typing indicator
  sock.on("typing", ({ from }) => {
    if (from !== peer) return;
    setSub("typing…", true);
    clearTimeout(typeTmr);
    typeTmr = setTimeout(() => setSub("Online ●"), 2500);
  });

  // Read receipts
  sock.on("messages-read", ({ by }) => {
    if (by !== peer) return;
    document.querySelectorAll(".tick").forEach(el => el.textContent = "✓✓");
  });
}

// ── INBOX ─────────────────────────────────────────────────────────────────
async function refreshInbox() {
  try {
    const r  = await api("/api/messages/inbox");
    if (!r.ok) throw new Error();
    const raw  = await r.json();
    // backend returns plain array
    const list = Array.isArray(raw) ? raw : (raw.conversations || []);
    renderInbox(list);
  } catch(e) {
    document.getElementById("inbox").innerHTML =
      `<div class="empty-state">
        <div class="empty-ico">⚠️</div>
        <div class="empty-ttl">Couldn't load</div>
        <div class="empty-sub">Check connection and <button onclick="refreshInbox()" style="background:none;border:none;color:var(--v2);cursor:pointer;font-family:var(--fB);text-decoration:underline">retry</button></div>
      </div>`;
  }
}

function renderInbox(list) {
  const box = document.getElementById("inbox");
  if (!list.length) {
    box.innerHTML =
      `<div class="empty-state">
        <div class="empty-ico">💬</div>
        <div class="empty-ttl">No messages yet</div>
        <div class="empty-sub">Go to Friends and tap<br/><strong style="color:var(--v2)">Message →</strong> to start a chat</div>
      </div>`;
    return;
  }
  box.innerHTML = list.map(c => `
    <div class="conv" onclick="openChat('${esc(c.with)}')">
      <div class="av">🎭</div>
      <div class="conv-body">
        <div class="conv-name">${esc(c.with)}</div>
        <div class="conv-preview">${c.lastMessage ? esc(c.lastMessage) : c.lastFileUrl ? "📎 Attachment" : "Say something!"}</div>
      </div>
      <div class="conv-r">
        <div class="conv-time">${ago(c.lastAt)}</div>
        ${c.unread > 0 ? `<div class="unread-badge">${c.unread > 9 ? "9+" : c.unread}</div>` : ""}
      </div>
    </div>`).join("");
}

// ── OPEN CHAT ─────────────────────────────────────────────────────────────
async function openChat(name) {
  peer = name;
  document.getElementById("chatName").textContent = name;
  setSub("Loading…");
  document.getElementById("msgs").innerHTML = `<div class="ld"><span class="spin"></span></div>`;
  document.getElementById("chat").classList.add("open");
  history.pushState({ peer: name }, "", `?with=${encodeURIComponent(name)}`);

  try {
    const r = await api(`/api/messages/chat/${encodeURIComponent(name)}`);
    if (!r.ok) throw new Error("Failed to load messages");
    const raw  = await r.json();
    const list = Array.isArray(raw) ? raw : (raw.messages || []);
    renderMsgs(list);
    setSub("Online ●");
    if (sockReady) sock.emit("message-read", { from: name });
  } catch(e) {
    document.getElementById("msgs").innerHTML =
      `<div class="sys">Couldn't load — <span onclick="openChat('${esc(name)}')" style="color:var(--v2);cursor:pointer">retry</span></div>`;
  }

  setTimeout(() => document.getElementById("inp")?.focus(), 120);
}

function renderMsgs(list) {
  const el = document.getElementById("msgs");
  if (!list.length) {
    el.innerHTML = `<div class="sys">Say hi to ${esc(peer)} 👋</div>`;
    return;
  }
  let html = "", lastDay = "";
  list.forEach(m => {
    const day = new Date(m.createdAt).toLocaleDateString([], { weekday:"short", month:"short", day:"numeric" });
    if (day !== lastDay) { html += `<div class="date-divider">${day}</div>`; lastDay = day; }
    html += bubbleHTML(m);
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function bubbleHTML(m) {
  const mine = m.from === ME.anonymousName;
  let body = "";
  if (m.fileUrl && m.isImage) {
    body = `<img src="${esc(m.fileUrl)}" style="max-width:200px;border-radius:10px;display:block;cursor:pointer" onclick="window.open('${esc(m.fileUrl)}','_blank')"/>`;
  } else if (m.fileUrl) {
    body = `<a href="${esc(m.fileUrl)}" target="_blank" rel="noopener" style="color:var(--v2)">📎 ${esc(m.fileName||"File")}</a>`;
  } else {
    body = esc(m.message||"").replace(/\n/g,"<br/>");
  }
  return `<div class="row ${mine?"me":"them"}">
    <div class="bubble">${body}
      <div class="meta">
        <span>${fmt(m.createdAt)}</span>
        ${mine ? `<span class="tick">✓</span>` : ""}
      </div>
    </div>
  </div>`;
}

function addBubble(m) {
  const el = document.getElementById("msgs");
  const d  = document.createElement("div");
  d.innerHTML = bubbleHTML(m);
  el.appendChild(d.firstElementChild);
  el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
}

// ── SEND ──────────────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById("inp");
  const msg = inp.value.trim();
  if (!msg || !peer) return;

  // Disable send while in flight
  const btn = document.getElementById("sendBtn");
  btn.disabled = true;
  inp.value = "";
  inp.style.height = "auto";

  // 1. Show immediately (optimistic)
  addBubble({ from: ME.anonymousName, message: msg, createdAt: new Date() });

  // 2. Try socket delivery (real-time, if recipient is online)
  if (sockReady) {
    sock.emit("private-message", { to: peer, message: msg });
  }

  // 3. ALWAYS persist to DB — this is the source of truth
  try {
    const r = await api("/api/messages/send", {
      method: "POST",
      body: JSON.stringify({ to: peer, message: msg })
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.message || "Send failed");
    }
  } catch(e) {
    toast("⚠️ " + e.message);
    // Show failure note on last bubble
    const rows = document.querySelectorAll(".row.me");
    const last = rows[rows.length - 1];
    if (last) {
      const note = document.createElement("div");
      note.className = "fail-note";
      note.textContent = "⚠️ Not delivered — check connection";
      last.appendChild(note);
    }
  }

  btn.disabled = false;
  inp.focus();
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function onType() {
  const inp = document.getElementById("inp");
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 100) + "px";
  if (peer && sockReady) sock.emit("typing", { to: peer });
}

// ── CLOSE / BACK ──────────────────────────────────────────────────────────
function closeChat() {
  peer = null;
  document.getElementById("chat").classList.remove("open");
  document.getElementById("chatName").textContent = "";
  setSub("—");
  history.replaceState(null, "", "messages.html");
  refreshInbox();
}

function goBack() {
  if (peer) closeChat();
  else location.href = "dashboard.html";
}

window.addEventListener("popstate", () => { if (peer) closeChat(); });

// ── HELPERS ───────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: { "Content-Type":"application/json", Authorization:`Bearer ${tok}`, ...(opts.headers||{}) }
  });
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmt(d) {
  return new Date(d).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}
function ago(d) {
  if (!d) return "";
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60)    return "just now";
  if (s < 3600)  return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h";
  return new Date(d).toLocaleDateString([], { month:"short", day:"numeric" });
}
function setDot(on) {
  const d = document.getElementById("dot");
  d.className = "dot" + (on ? "" : " off");
  d.title = on ? "Connected" : "Disconnected";
}
function setSub(txt, typing=false) {
  const el = document.getElementById("chatSub");
  if (!el) return;
  el.textContent = txt;
  el.className = "chat-sub" + (typing ? " typing" : "");
}
function toast(msg, ms=3200) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove("show"), ms);
}

// ── INIT ──────────────────────────────────────────────────────────────────
connectSocket();
refreshInbox();

// Handle ?with= param — open chat directly
const startPeer = new URLSearchParams(location.search).get("with");
if (startPeer) {
  // Wait briefly for inbox to load then open chat
  setTimeout(() => openChat(decodeURIComponent(startPeer)), 80);
}
</script>
</body>
</html>
