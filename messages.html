<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#030308"/>
<title>Messages · Annomuss</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Cabinet+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{
  --bg:#030308;--bg1:#08080f;--bg2:#0d0d1c;--bg3:#121228;
  --v:#7B5EA7;--v2:#9B7FD4;--v3:#C4A8FF;--vg:rgba(123,94,167,.12);--vb:rgba(123,94,167,.25);
  --cr:#FF4D6D;--tl:#00C9A7;--lm:#52B788;
  --tx:#F5F3FF;--tx2:#9896B8;--tx3:#4E4C6A;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);--bd3:rgba(255,255,255,.16);
  --safe:env(safe-area-inset-bottom,0px);
  --fD:'Clash Display',sans-serif;--fB:'Cabinet Grotesk',sans-serif;--fM:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fB);font-size:15px;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:none;border:none;outline:none;resize:none}
::-webkit-scrollbar{width:0;height:0}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% -20%,rgba(123,94,167,.07),transparent 55%)}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

/* ── Header ── */
#header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:rgba(3,3,8,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
#back-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--tx2);flex-shrink:0;
}
#partner-av{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--v),var(--cr));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;border:1.5px solid var(--bd2);
  position:relative;
}
.av-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--lm);border:2px solid var(--bg);}
#partner-info{flex:1;min-width:0}
#partner-name{font-family:var(--fD);font-weight:700;font-size:.92rem;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#partner-status{font-size:.7rem;color:var(--tx3);margin-top:1px}

/* ── Messages area ── */
#msgs-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(14px + var(--safe));
  display:flex;flex-direction:column;gap:6px;
}

/* ── Bubbles ── */
.bubble-wrap{display:flex;flex-direction:column;max-width:78%}
.bubble-wrap.me{align-self:flex-end;align-items:flex-end}
.bubble-wrap.them{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:10px 14px;border-radius:18px;
  font-size:.92rem;line-height:1.5;word-break:break-word;
  animation:bIn .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bIn{from{opacity:0;transform:scale(.88) translateY(4px)}to{opacity:1;transform:none}}
.bubble.me{
  background:linear-gradient(135deg,#7B5EA7,#5a3d9e);
  color:#fff;border-bottom-right-radius:4px;
}
.bubble.them{
  background:var(--bg3);border:1px solid var(--bd2);
  color:var(--tx);border-bottom-left-radius:4px;
}
.bubble-time{font-size:.65rem;color:var(--tx3);margin-top:3px;font-family:var(--fM)}
.bubble.me + .bubble-time{color:rgba(196,168,255,.5)}

/* delivery status */
.delivery{font-size:.65rem;margin-top:2px;font-family:var(--fM)}
.delivery.sent{color:rgba(196,168,255,.4)}
.delivery.fail{color:var(--cr)}

/* date divider */
.date-divider{
  text-align:center;font-size:.68rem;color:var(--tx3);
  padding:8px 0;font-family:var(--fM);
  display:flex;align-items:center;gap:8px;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--bd)}

/* typing dots */
.typing-dots{
  display:none;align-self:flex-start;
  align-items:center;gap:4px;
  padding:9px 13px;
  background:var(--bg3);border:1px solid var(--bd2);
  border-radius:18px;border-bottom-left-radius:4px;
}
.typing-dots.show{display:flex}
.td{width:6px;height:6px;border-radius:50%;background:var(--tx3);animation:td .6s infinite ease-in-out}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}

/* empty state */
.empty-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;gap:8px;
}

/* ── Input bar ── */
#input-bar{
  display:flex;align-items:flex-end;gap:8px;
  padding:10px 14px;padding-bottom:calc(10px + var(--safe));
  background:rgba(3,3,8,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);
  flex-shrink:0;
}
#msg-input{
  flex:1;
  background:var(--bg2);border:1.5px solid var(--bd2);
  border-radius:22px;padding:10px 16px;
  font-size:.9rem;color:var(--tx);
  max-height:120px;overflow-y:auto;
  transition:border-color .2s;line-height:1.4;
}
#msg-input:focus{border-color:var(--v)}
#msg-input::placeholder{color:var(--tx3)}
#send-btn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--v),var(--cr));
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  box-shadow:0 4px 14px rgba(123,94,167,.4);
  transition:transform .12s,opacity .12s;
}
#send-btn:active{transform:scale(.9)}
#send-btn:disabled{opacity:.4;transform:none}

/* toast */
#toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--bd3);border-radius:100px;padding:9px 18px;font-size:.82rem;font-weight:700;font-family:var(--fD);color:var(--tx);box-shadow:0 8px 28px rgba(0,0,0,.5);animation:tIn .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.out{animation:tOut .18s ease forwards}
@keyframes tIn{from{opacity:0;transform:translateY(-8px) scale(.9)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px) scale(.9)}}

/* session modal */
#sess-modal{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:24px}
#sess-modal.on{display:flex}
.sess-card{background:var(--bg2);border:1px solid var(--bd2);border-radius:22px;padding:32px;text-align:center;max-width:300px;width:100%}
.btn-v{background:linear-gradient(135deg,#7B5EA7,#6040C4);color:#fff;border:none;border-radius:100px;padding:10px 24px;font-family:var(--fD);font-weight:700;font-size:.83rem;cursor:pointer}
</style>
</head>
<body>

<div id="sess-modal">
  <div class="sess-card">
    <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
    <div style="font-family:var(--fD);font-weight:700;font-size:1rem;margin-bottom:8px">Session Expired</div>
    <div style="font-size:.83rem;color:var(--tx3);margin-bottom:18px">Please log in again.</div>
    <button class="btn-v" onclick="location.href='/index.html'">Log In</button>
  </div>
</div>
<div id="toast-wrap"></div>

<div id="app">
  <div id="header">
    <button id="back-btn" onclick="history.back()">←</button>
    <div id="partner-av">🎭</div>
    <div id="partner-info">
      <div id="partner-name">Loading...</div>
      <div id="partner-status">...</div>
    </div>
    <button onclick="showMsgMenu()" style="width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--tx2);flex-shrink:0">⋯</button>
  </div>

  <!-- Message action menu -->
  <div id="msg-menu" style="display:none;position:fixed;top:70px;right:14px;z-index:200;background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:160px">
    <div onclick="reportUser()" style="padding:12px 16px;font-size:.85rem;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd)">⚠️ Report user</div>
    <div onclick="blockUser()" style="padding:12px 16px;font-size:.85rem;color:var(--cr);cursor:pointer;display:flex;align-items:center;gap:10px">🚫 Block user</div>
  </div>

  <div id="msgs-wrap">
    <div style="padding:40px;text-align:center">
      <div style="width:26px;height:26px;border:2.5px solid var(--bd2);border-top-color:var(--v);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto"></div>
    </div>
    <div class="typing-dots" id="typing-dots">
      <div class="td"></div><div class="td"></div><div class="td"></div>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Message..." rows="1"
      oninput="autoResize(this);onTyping()"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
    </textarea>
    <button id="send-btn" onclick="sendMsg()" disabled>➤</button>
  </div>
</div>

@keyframes spin{to{transform:rotate(360deg)}}

<script>
const API = 'https://annomuss-backend-icgp.onrender.com';
const params = new URLSearchParams(location.search);
const WITH_ID   = params.get('with');
const WITH_NAME = params.get('name') || 'Anonymous'; // fallback from URL

let user = null, token = null, socket = null;
let typingTimer = null, isTyping = false;
let lastDateLabel = null;

// ── helpers ──────────────────────────────────
function q(id){return document.getElementById(id)}
function toast(msg,dur=2800){
  const w=q('toast-wrap'),el=document.createElement('div');
  el.className='toast';el.textContent=msg;w.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),200);},dur);
}
function getToken(){return localStorage.getItem('token')}
function timeStr(d){
  const dt=new Date(d);
  return dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function dateLabel(d){
  const dt=new Date(d),now=new Date();
  const today=now.toDateString(),yest=new Date(now-86400000).toDateString();
  if(dt.toDateString()===today)return'Today';
  if(dt.toDateString()===yest)return'Yesterday';
  return dt.toLocaleDateString([],{month:'short',day:'numeric'});
}

async function api(path,opts={}){
  const t=getToken();
  const headers={'Content-Type':'application/json',...(opts.headers||{})};
  if(t)headers.Authorization=`Bearer ${t}`;
  const r=await fetch(`${API}${path}`,{...opts,headers});
  if(r.status===401){q('sess-modal').classList.add('on');throw new Error('401');}
  return r;
}

// ── Session ──────────────────────────────────
async function init(){
  token=getToken();
  if(!token){location.href='/index.html';return;}
  if(!WITH_ID){location.href='/dashboard.html';return;}

  try{
    const r=await fetch(`${API}/api/users/me`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok){q('sess-modal').classList.add('on');return;}
    user=await r.json();
  }catch(e){
    const cached=localStorage.getItem('user');
    if(cached)user=JSON.parse(cached);
    else{location.href='/index.html';return;}
  }

  // Load partner info
  await loadPartnerInfo();
  // Load messages
  await loadMessages();
  // Connect socket
  initSocket();
}

async function loadPartnerInfo(){
  // Set name from URL param immediately so it's not blank
  q('partner-name').textContent = decodeURIComponent(WITH_NAME);
  q('partner-status').textContent = 'Loading...';

  try{
    const r=await api(`/api/users/${WITH_ID}`);
    if(r.ok){
      const u=await r.json();
      q('partner-name').textContent = u.anonymousName || decodeURIComponent(WITH_NAME);
      q('partner-av').textContent   = u.avatarEmoji   || '🎭';
      q('partner-status').textContent = u.online ? '🟢 Online now' : 'Offline';
    } else {
      // Fallback: name from URL is fine
      q('partner-name').textContent = decodeURIComponent(WITH_NAME);
      q('partner-status').textContent = '';
    }
  }catch(e){
    q('partner-name').textContent = decodeURIComponent(WITH_NAME);
    q('partner-status').textContent = '';
  }
}

// ── Load messages ─────────────────────────────
async function loadMessages(){
  try{
    const r=await api(`/api/messages/${WITH_ID}`);
    if(!r.ok)throw new Error('Failed');
    const msgs=await r.json();
    renderMessages(msgs);
  }catch(e){
    const wrap=q('msgs-wrap');
    const errDiv=document.createElement('div');
    errDiv.style.cssText='text-align:center;padding:20px;font-size:.83rem;color:var(--tx3)';
    errDiv.innerHTML=`Couldn't load — <span style="color:var(--v3);cursor:pointer" onclick="loadMessages()">retry</span>`;
    // Insert before typing dots
    wrap.insertBefore(errDiv, q('typing-dots'));
  }
}

function renderMessages(msgs){
  const wrap=q('msgs-wrap');
  // Clear everything except typing dots
  while(wrap.firstChild && wrap.firstChild.id !== 'typing-dots'){
    wrap.removeChild(wrap.firstChild);
  }
  lastDateLabel=null;

  if(!msgs.length){
    const empty=document.createElement('div');
    empty.className='empty-chat';
    empty.innerHTML=`
      <div style="font-size:3rem;margin-bottom:4px">💌</div>
      <div style="font-family:var(--fD);font-weight:700;font-size:.95rem">Start the conversation</div>
      <div style="font-size:.82rem;color:var(--tx3);max-width:200px;line-height:1.6">Be real. Be kind. This is anonymous.</div>`;
    wrap.insertBefore(empty, q('typing-dots'));
    return;
  }

  msgs.forEach(m=>appendMessage(m, false));
  scrollToBottom(true);
}

function appendMessage(m, scroll=true){
  const wrap=q('msgs-wrap');
  const isMe = (m.from?._id || m.from)?.toString() === user._id?.toString();
  const ts = m.createdAt || new Date();

  // Date divider
  const dl=dateLabel(ts);
  if(dl!==lastDateLabel){
    lastDateLabel=dl;
    const div=document.createElement('div');
    div.className='date-divider';
    div.textContent=dl;
    wrap.insertBefore(div, q('typing-dots'));
  }

  const bwrap=document.createElement('div');
  bwrap.className=`bubble-wrap ${isMe?'me':'them'}`;
  bwrap.id=m._id?`msg-${m._id}`:'';
  bwrap.innerHTML=`
    <div class="bubble ${isMe?'me':'them'}">${esc(m.text)}</div>
    <div class="bubble-time">${timeStr(ts)}</div>`;
  wrap.insertBefore(bwrap, q('typing-dots'));

  if(scroll)scrollToBottom();
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function scrollToBottom(instant=false){
  const w=q('msgs-wrap');
  if(instant)w.scrollTop=w.scrollHeight;
  else requestAnimationFrame(()=>w.scrollTop=w.scrollHeight);
}

// ── Send message ──────────────────────────────
async function sendMsg(){
  const inp=q('msg-input');
  const text=inp.value.trim();
  if(!text)return;

  inp.value='';
  autoResize(inp);
  q('send-btn').disabled=true;

  // Optimistic bubble
  const tempId='temp-'+Date.now();
  const wrap=q('msgs-wrap');
  const bwrap=document.createElement('div');
  bwrap.className='bubble-wrap me';
  bwrap.id=tempId;
  bwrap.innerHTML=`
    <div class="bubble me">${esc(text)}</div>
    <div class="bubble-time">${timeStr(new Date())} <span style="opacity:.5">sending...</span></div>`;
  wrap.insertBefore(bwrap, q('typing-dots'));
  scrollToBottom();

  try{
    const r=await api(`/api/messages/${WITH_ID}`,{method:'POST',body:JSON.stringify({text})});
    if(!r.ok){
      const el=document.getElementById(tempId);
      if(el){el.querySelector('.bubble-time').innerHTML=`<span style="color:var(--cr)">⚠ Not delivered — check connection</span>`;}
      toast('Message not delivered ❌');
      q('send-btn').disabled=false;
      return;
    }
    const msg=await r.json();
    // Replace temp with real
    const el=document.getElementById(tempId);
    if(el){
      el.id=msg._id?`msg-${msg._id}`:'';
      el.querySelector('.bubble-time').textContent=timeStr(msg.createdAt||new Date())+' ✓';
    }
  }catch(e){
    const el=document.getElementById(tempId);
    if(el){el.querySelector('.bubble-time').innerHTML=`<span style="color:var(--cr)">⚠ Not delivered — check connection</span>`;}
    toast('Network error ❌');
  }
  q('send-btn').disabled=false;
}

// ── Typing ────────────────────────────────────
function onTyping(){
  q('send-btn').disabled=!q('msg-input').value.trim();
  if(!socket||!isConnected)return;
  if(!isTyping){
    isTyping=true;
    socket.emit('typing',{recipientId:WITH_ID,isTyping:true});
  }
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{
    isTyping=false;
    socket.emit('typing',{recipientId:WITH_ID,isTyping:false});
  },1500);
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ── Socket ────────────────────────────────────
let isConnected=false;
function initSocket(){
  if(socket&&socket.connected)return;
  socket=io(API,{
    auth:{token:getToken()},
    transports:['websocket','polling'],
    reconnection:true,reconnectionDelay:1000,
  });

  socket.on('connect',()=>{
    isConnected=true;
    socket.emit('register');
    q('partner-status').textContent='🟢 Connected';
  });

  socket.on('disconnect',()=>{
    isConnected=false;
    q('partner-status').textContent='Reconnecting...';
  });

  // Incoming message from partner
  socket.on('new-message',(d)=>{
    if(d.fromId===WITH_ID){
      // Build a fake message object and append
      appendMessage({
        _id: d.msgId,
        from: {_id: d.fromId},
        text: d.text,
        createdAt: d.createdAt || new Date(),
      });
      q('typing-dots').classList.remove('show');
    }
  });

  // Partner typing
  socket.on('typing',(d)=>{
    if(d.from===WITH_ID){
      q('typing-dots').classList.toggle('show',d.isTyping);
      if(d.isTyping)scrollToBottom();
    }
  });

  // Online status
  socket.on('user-online',(d)=>{
    if(d.userId===WITH_ID)q('partner-status').textContent='🟢 Online now';
  });
  socket.on('user-offline',(d)=>{
    if(d.userId===WITH_ID)q('partner-status').textContent='Last seen recently';
  });
}

// ── Message menu (block / report) ─────────────
function showMsgMenu(){
  const m=document.getElementById('msg-menu');
  if(!m)return;
  m.style.display=m.style.display==='none'?'block':'none';
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',()=>{m.style.display='none';},{once:true}),50);
}

async function blockUser(){
  if(!confirm(`Block this user? They won't be able to message you.`))return;
  try{
    await api(`/api/users/block/${WITH_ID}`,{method:'POST'});
    toast('🚫 User blocked');
    setTimeout(()=>history.back(),1200);
  }catch(e){toast('Failed — try again');}
}

function reportUser(){
  if(!confirm('Report this user for inappropriate behaviour?'))return;
  api(`/api/users/${WITH_ID}/report`,{method:'POST',body:JSON.stringify({reason:'inappropriate_dm'})})
    .then(()=>toast('⚠️ Reported — thank you. We\'ll review within 24h.'))
    .catch(()=>toast('⚠️ Reported'));
}

// ── Enter key ─────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  init();
  q('msg-input').addEventListener('input',()=>{
    q('send-btn').disabled=!q('msg-input').value.trim();
  });
});
</script>
</body>
</html>
