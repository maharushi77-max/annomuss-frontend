<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#030308"/>
<title>Page Not Found · Annomuss</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Cabinet+Grotesk:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#030308;--v:#7B5EA7;--v3:#C4A8FF;--vg:rgba(123,94,167,.1);--vb:rgba(123,94,167,.22);--tx:#F5F3FF;--tx2:#9896B8;--tx3:#4E4C6A;--fD:'Clash Display',sans-serif;--fB:'Cabinet Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fB);display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(123,94,167,.07),transparent 60%);pointer-events:none}
.wrap{text-align:center;padding:32px 24px;position:relative;z-index:1;max-width:360px}
.orb{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#7B5EA7,#FF4D6D);display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin:0 auto 24px;box-shadow:0 0 60px rgba(123,94,167,.35);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-family:var(--fD);font-size:2rem;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
p{font-size:.9rem;color:var(--tx2);line-height:1.7;margin-bottom:28px;max-width:280px;margin-left:auto;margin-right:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:100px;font-size:.85rem;font-weight:700;font-family:var(--fD);letter-spacing:.04em;cursor:pointer;text-decoration:none;border:none;transition:transform .12s}
.btn:active{transform:scale(.95)}
.btn-v{background:linear-gradient(135deg,#7B5EA7,#6040C4);color:#fff;box-shadow:0 4px 18px rgba(123,94,167,.38);display:block;margin-bottom:10px}
.btn-g{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid rgba(255,255,255,.1);display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb">🎭</div>
  <h1>Lost in the void</h1>
  <p>This page doesn't exist — or maybe it never did. Either way, there's something real waiting for you on the feed.</p>
  <a href="/dashboard.html" class="btn btn-v">🏠 Back to Feed</a>
  <a href="/index.html" class="btn btn-g">🔐 Log In</a>
</div>
<script>
// If user has a token, send them to dashboard
const t=localStorage.getItem('token');
if(t)document.querySelector('.btn-g').style.display='none';
</script>
</body>
</html>
