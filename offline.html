<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#06060f"/>
<title>Annomuss — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--v:#7c5cf4;--coral:#ff5c7a;--tx:#edeaff;--tx3:#4a4770;--bg:#06060f;--l2:#10101f}
body{background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 20px;text-align:center;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 20%,rgba(124,92,244,.08),transparent 60%)}
.emoji{font-size:4rem;margin-bottom:20px;display:block;animation:float 3s ease infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:900;margin-bottom:10px;letter-spacing:-.3px}
h1 span{background:linear-gradient(135deg,#9d7eff,#ff5c7a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{font-size:.88rem;color:var(--tx3);line-height:1.7;max-width:300px;margin:0 auto 28px}
.card{background:var(--l2);border:1px solid #1c1c34;border-radius:18px;padding:20px;max-width:340px;width:100%;margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:900;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.tip{font-size:.82rem;color:#9490c0;line-height:1.65;font-style:italic}
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--v),var(--coral));color:#fff;
  font-family:'Syne',sans-serif;font-size:.82rem;font-weight:900;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 16px rgba(124,92,244,.3);text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,92,244,.45)}
.status{margin-top:16px;font-size:.7rem;color:var(--tx3);font-family:'Courier New',monospace}
#online-indicator{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff5c7a;margin-right:5px;vertical-align:middle}
#online-indicator.online{background:#3ddc84}
</style>
</head>
<body>
<span class="emoji">🎭</span>
<h1>You're <span>offline</span></h1>
<p>Annomuss needs a connection to load your feed and connect you with others. Check your internet and try again.</p>

<div class="card">
  <div class="card-title">💭 While you wait</div>
  <div class="tip" id="tip">"The emotions we feel today are the stories we'll tell tomorrow."</div>
</div>

<a class="btn" onclick="tryReconnect()">↻ Try Again</a>

<div class="status">
  <span id="online-indicator"></span>
  <span id="status-txt">Checking connection…</span>
</div>

<script>
const tips = [
  '"The emotions we feel today are the stories we\'ll tell tomorrow."',
  '"You don\'t have to be perfect to deserve to be heard."',
  '"Sharing how you feel is an act of bravery, not weakness."',
  '"Every feeling you have is valid. Every single one."',
  '"Being anonymous doesn\'t make your feelings less real."',
  '"Connection begins when someone feels understood."',
  '"You are not alone in feeling alone."',
];
document.getElementById("tip").textContent = tips[Math.floor(Math.random() * tips.length)];

function updateStatus() {
  const dot = document.getElementById("online-indicator");
  const txt = document.getElementById("status-txt");
  if (navigator.onLine) {
    dot.className = "online";
    txt.textContent = "Connection restored — reloading…";
    setTimeout(() => location.reload(), 1000);
  } else {
    dot.className = "";
    txt.textContent = "No internet connection";
  }
}

function tryReconnect() {
  updateStatus();
  if (navigator.onLine) location.reload();
}

window.addEventListener("online",  updateStatus);
window.addEventListener("offline", updateStatus);
updateStatus();
</script>
</body>
</html>
