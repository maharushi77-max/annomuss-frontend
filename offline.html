<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#030308"/>
<title>Offline · Annomuss</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#030308;color:#F5F3FF;font-family:'Cabinet Grotesk',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(123,94,167,.08),transparent 70%)}
.wrap{position:relative;z-index:1;max-width:320px}
.ico{font-size:4rem;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:1.4rem;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
p{font-size:.875rem;color:#9896B8;line-height:1.7;margin-bottom:24px}
button{
  padding:12px 28px;border-radius:100px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#7B5EA7,#FF4D6D);
  color:#fff;font-size:.85rem;font-weight:700;letter-spacing:.04em;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 20px rgba(123,94,167,.4);
  font-family:inherit;
}
button:active{transform:scale(.95)}
.dots{display:flex;justify-content:center;gap:6px;margin-top:20px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15)}
.dot.active{background:#7B5EA7;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="ico">🌙</div>
  <h1>You're offline</h1>
  <p>Annomuss needs a connection to load your feed and chat. Check your internet and try again.</p>
  <button onclick="retry()">Try again</button>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
<script>
function retry(){
  if(navigator.onLine){location.href='/dashboard.html';}
  else{
    const btn=document.querySelector('button');
    btn.textContent='Still offline...';
    setTimeout(()=>btn.textContent='Try again',2000);
  }
}
// Auto-redirect when connection comes back
window.addEventListener('online',()=>{
  document.querySelector('h1').textContent='Back online!';
  document.querySelector('p').textContent='Redirecting you to Annomuss...';
  setTimeout(()=>location.href='/dashboard.html',800);
});
// Animate dots
let i=0;
setInterval(()=>{
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.dot')[i%3].classList.add('active');
  i++;
},600);
</script>
</body>
</html>
