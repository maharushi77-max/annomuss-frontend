<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#030308"/>
<title>You're offline · Annomuss</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Cabinet+Grotesk:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#030308;--bg2:#0d0d1c;--v:#7B5EA7;--v3:#C4A8FF;--vg:rgba(123,94,167,.1);--vb:rgba(123,94,167,.22);--tl:#00C9A7;--tx:#F5F3FF;--tx2:#9896B8;--tx3:#4E4C6A;--bd:rgba(255,255,255,.06);--fD:'Clash Display',sans-serif;--fB:'Cabinet Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--fB);display:flex;align-items:center;justify-content:center;text-align:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(123,94,167,.07),transparent 60%);pointer-events:none}
.wrap{padding:32px 24px;max-width:360px;position:relative;z-index:1}
.orb{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#1a0a2e,#2d1560);border:2px solid var(--vb);display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin:0 auto 24px;box-shadow:0 0 60px rgba(123,94,167,.2);animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:var(--fD);font-size:1.6rem;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.sub{font-size:.9rem;color:var(--tx2);line-height:1.75;margin-bottom:28px;max-width:280px;margin-left:auto;margin-right:auto}
.btn{display:block;width:100%;padding:13px;border-radius:100px;font-size:.85rem;font-weight:700;font-family:var(--fD);letter-spacing:.04em;cursor:pointer;transition:transform .12s;border:none;margin-bottom:10px;text-decoration:none}
.btn:active{transform:scale(.95)}
.btn-v{background:linear-gradient(135deg,#7B5EA7,#6040C4);color:#fff;box-shadow:0 4px 18px rgba(123,94,167,.38)}
.btn-g{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bd)}
.tip{font-size:.75rem;color:var(--tx3);margin-top:20px;line-height:1.7;padding:12px;background:var(--bg2);border-radius:12px;border:1px solid var(--bd)}
.tip strong{color:var(--tx2)}
.status{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;background:var(--bg2);border:1px solid var(--bd);font-size:.75rem;color:var(--tx3);margin-bottom:24px;font-family:var(--fD)}
.dot{width:7px;height:7px;border-radius:50%;background:#ff4d6d;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot.online{background:var(--tl);animation:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb">🌙</div>
  <div class="status" id="status-pill">
    <div class="dot" id="dot"></div>
    <span id="status-text">No connection</span>
  </div>
  <h1>You're in the void</h1>
  <p class="sub">Annomuss needs a connection to load your feed and chat. Check your wifi or data and try again.</p>
  <button class="btn btn-v" onclick="tryReconnect()">🔄 Try again</button>
  <button class="btn btn-g" onclick="history.back()">← Go back</button>
  <div class="tip"><strong>Already logged in?</strong> Some pages may still work from cache — try going back and tapping Feed.</div>
</div>
<script>
function tryReconnect(){
  const btn=document.querySelector('.btn-v');
  btn.textContent='Checking...';btn.disabled=true;
  setTimeout(()=>{
    if(navigator.onLine){location.href='/dashboard.html';}
    else{btn.textContent='🔄 Still offline — try again';btn.disabled=false;}
  },1500);
}
function updateStatus(){
  const dot=document.getElementById('dot'),txt=document.getElementById('status-text');
  if(navigator.onLine){dot.classList.add('online');txt.textContent='Connection restored!';setTimeout(()=>location.href='/dashboard.html',1000);}
  else{dot.classList.remove('online');txt.textContent='No connection';}
}
window.addEventListener('online',updateStatus);
window.addEventListener('offline',updateStatus);
updateStatus();
</script>
</body>
</html>
